<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Prediction</title>

    <link rel="stylesheet" href="../static/style.css">
</head>

<body>

    <h1>🌾 Crop Recommendation System</h1>

    <div class="container">
<form action="/predict_crop" method="POST">

    <label>Nitrogen (N)</label><br>
    <input type="number" name="N" placeholder="Enter Nitrogen value" required><br><br>

    <label>Phosphorus (P)</label><br>
    <input type="number" name="P" placeholder="Enter Phosphorus value" required><br><br>

    <label>Potassium (K)</label><br>
    <input type="number" name="K" placeholder="Enter Potassium value" required><br><br>

    <label>Temperature (°C)</label><br>
    <input type="number" step="0.01" name="temperature" placeholder="Enter Temperature" required><br><br>

    <label>Humidity (%)</label><br>
    <input type="number" step="0.01" name="humidity" placeholder="Enter Humidity" required><br><br>

    <label>pH Value</label><br>
    <input type="number" step="0.01" name="ph" placeholder="Enter Soil pH" required><br><br>

    <label>Rainfall (mm)</label><br>
    <input type="number" step="0.01" name="rainfall" placeholder="Enter Rainfall" required><br><br>

    <button type="submit">🌱 Predict Best Crop</button>

</form>

        {% if prediction %}
<div class="result">
    <h2>🌱 Recommended Crop</h2>
    <h1>{{ prediction }}</h1>
</div>
{% endif %}

    </div>

</body>
</html>
